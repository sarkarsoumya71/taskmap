<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskMap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'IBM Plex Sans',system-ui,sans-serif}

  #topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(10,10,15,.97) 70%,transparent)}
  #topbar .title{font-size:17px;font-weight:600;color:#e0e0f0;letter-spacing:-.02em}
  #topbar .sub{font-size:11px;color:#7a7a9a;margin-top:1px}
  #topbar .right{display:flex;align-items:center;gap:12px}
  .progress-track{width:100px;height:5px;background:#2a2a3e;border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;transition:width .4s,background .3s}
  #counter{font-size:12px;color:#7a7a9a;font-weight:500;font-variant-numeric:tabular-nums;min-width:34px}
  .topbtn{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:500;border:1px solid #2a2a3e;background:transparent;color:#7a7a9a;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .2s}
  .topbtn.active{background:#5b5bd6;color:#fff;border-color:#5b5bd6}

  #zoomBadge{position:fixed;bottom:16px;left:16px;z-index:100;background:#141420;border:1px solid #2a2a3e;border-radius:6px;padding:6px 12px;display:flex;align-items:center;gap:8px}
  #zoomBadge span{font-size:12px;color:#7a7a9a;font-weight:500;font-variant-numeric:tabular-nums;min-width:36px;text-align:center}
  .zbtn{width:24px;height:24px;border-radius:4px;border:1px solid #2a2a3e;background:transparent;color:#7a7a9a;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;padding:0}
  .zbtn:hover{border-color:#5b5bd6;color:#5b5bd6}

  #panel{position:fixed;top:58px;right:14px;width:270px;bottom:14px;z-index:90;background:#111119;border:1px solid #1e1e30;border-radius:10px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  #panel.hidden{display:none}
  #panel .head{padding:10px 14px 8px;border-bottom:1px solid #1e1e30;display:flex;justify-content:space-between;align-items:center}
  #panel .head span:first-child{font-size:11px;font-weight:600;color:#7a7a9a;text-transform:uppercase;letter-spacing:.06em}
  #panel .head span:last-child{font-size:10px;color:#7a7a9a}
  #listbox{flex:1;background:transparent;border:none;color:#e0e0f0;font-size:13px;line-height:1.7;padding:12px 14px;resize:none;outline:none;font-family:'IBM Plex Mono',monospace;tab-size:2}
  #panel .foot{padding:8px 14px 6px;border-top:1px solid #1e1e30;display:flex;gap:6px}
  .footbtn{flex:1;padding:6px 0;border-radius:5px;border:1px solid #2a2a3e;background:transparent;color:#7a7a9a;font-size:11px;font-weight:500;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .15s}
  .footbtn:hover{border-color:#5b5bd6;color:#5b5bd6}
  .footbtn.danger{color:#e5484d}
  .footbtn.danger:hover{border-color:#e5484d}

  /* Sync section */
  #syncSection{padding:8px 14px;border-top:1px solid #1e1e30}
  #syncSection .sync-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:2px 0}
  #syncSection .sync-header span{font-size:11px;font-weight:600;color:#7a7a9a;text-transform:uppercase;letter-spacing:.06em}
  #syncSection .sync-header .arrow{font-size:10px;color:#7a7a9a;transition:transform .2s}
  #syncSection .sync-header .arrow.open{transform:rotate(180deg)}
  #syncBody{overflow:hidden;transition:max-height .25s;max-height:0}
  #syncBody.open{max-height:200px}
  #syncBody .inner{padding:8px 0 4px}
  .sync-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
  .sync-input{flex:1;background:#0a0a0f;border:1px solid #2a2a3e;border-radius:4px;padding:5px 8px;color:#e0e0f0;font-size:11px;font-family:'IBM Plex Mono',monospace;outline:none}
  .sync-input:focus{border-color:#5b5bd6}
  .sync-input::placeholder{color:#4a4a6a}
  .syncbtn{padding:5px 10px;border-radius:4px;border:1px solid #2a2a3e;background:transparent;color:#7a7a9a;font-size:11px;font-weight:500;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap;transition:all .15s}
  .syncbtn:hover{border-color:#5b5bd6;color:#5b5bd6}
  .syncbtn.primary{background:#5b5bd6;border-color:#5b5bd6;color:#fff}
  .syncbtn.primary:hover{background:#6c6ce0}
  #syncStatus{font-size:10px;color:#7a7a9a;padding:2px 0}
  #syncStatus.ok{color:#3dd68c}
  #syncStatus.err{color:#e5484d}

  #panel .status{padding:4px 14px 8px;font-size:10px;color:#7a7a9a;text-align:center}

  #canvas{width:100%;height:100%;position:relative;overflow:hidden}
  #world{position:absolute;top:0;left:0;transform-origin:0 0}
  #lines{position:absolute;top:0;left:0;width:20000px;height:20000px;pointer-events:none;z-index:1;overflow:visible}

  .node{position:absolute;transform:translate(-50%,-50%);border-radius:8px;padding:8px 12px;white-space:nowrap;cursor:grab;user-select:none;display:flex;align-items:center;gap:8px;z-index:10;transition:opacity .25s,box-shadow .2s}
  .node.root{border:1px solid #5b5bd6;box-shadow:0 0 16px rgba(91,91,214,.25)}
  .node.child{border:1px solid #2a2a3e;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .node.done-self{background:rgba(20,20,32,.5)}
  .node.done-ancestor{opacity:.45}
  .node:not(.done-self):not(.done-ancestor){background:#141420}

  .chk{width:16px;height:16px;min-width:16px;border-radius:3px;border:2px solid #2a2a3e;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;flex-shrink:0}
  .chk.checked{border-color:#3dd68c;background:#3dd68c;box-shadow:0 0 8px rgba(61,214,140,.2)}

  .node-label{font-size:12.5px;font-weight:400;color:#e0e0f0;line-height:1.3;font-family:'IBM Plex Sans',sans-serif}
  .node.root .node-label{font-size:14px;font-weight:600}
  .node.done-self .node-label,.node.done-ancestor .node-label{color:#4a4a6a;text-decoration:line-through}

  .node-edit{background:transparent;border:none;border-bottom:1px solid #5b5bd6;color:#e0e0f0;font-size:12.5px;font-family:'IBM Plex Sans',sans-serif;font-weight:400;outline:none;width:100%;min-width:60px}
  .node.root .node-edit{font-size:14px;font-weight:600}
</style>
</head>
<body>

<div id="topbar">
  <div>
    <div class="title">TaskMap</div>
    <div class="sub">Write the list. Get the map.</div>
  </div>
  <div class="right">
    <div class="progress-track"><div class="progress-fill" id="progfill"></div></div>
    <span id="counter">0/0</span>
    <button class="topbtn active" id="toggleBtn">Hide List</button>
  </div>
</div>

<div id="zoomBadge">
  <button class="zbtn" id="zoomOut">-</button>
  <span id="zoomLevel">100%</span>
  <button class="zbtn" id="zoomIn">+</button>
  <button class="zbtn" id="zoomFit" style="font-size:11px;width:auto;padding:0 6px" title="Fit to view">Fit</button>
</div>

<div id="panel">
  <div class="head">
    <span>Task List</span>
    <span>Tab / Shift+Tab</span>
  </div>
  <textarea id="listbox" spellcheck="false" placeholder="My Project&#10;  Task one&#10;    Subtask&#10;  Task two"></textarea>
  <div class="foot">
    <button class="footbtn" id="exportBtn">Export</button>
    <button class="footbtn" id="importBtn">Import</button>
    <button class="footbtn danger" id="resetBtn">Reset</button>
  </div>
  <div id="syncSection">
    <div class="sync-header" id="syncToggle">
      <span>Cloud Sync</span>
      <span class="arrow" id="syncArrow">&#9660;</span>
    </div>
    <div id="syncBody">
      <div class="inner">
        <div class="sync-row">
          <input class="sync-input" id="apiKeyInput" type="password" placeholder="JSONBin API key" />
        </div>
        <div class="sync-row">
          <input class="sync-input" id="binIdInput" placeholder="Bin ID (blank = new)" />
          <button class="syncbtn primary" id="syncSaveBtn">Save</button>
        </div>
        <div class="sync-row">
          <button class="syncbtn" id="syncNowBtn">Sync Now</button>
          <button class="syncbtn" id="syncPullBtn">Pull</button>
        </div>
        <div id="syncStatus"></div>
      </div>
    </div>
  </div>
  <div class="status">Auto-saves locally + cloud if configured</div>
</div>

<div id="canvas">
  <div id="world">
    <svg id="lines" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script>
const SAMPLE = `Product Launch
  Research
    Competitor analysis
    User interviews
    Market sizing
  Design
    Wireframes
    Prototype
    User testing
  Build
    Frontend
    Backend
    QA
  Launch
    Marketing site
    Press outreach
    Analytics setup`;

// ── State ──
let nodes = [];
let pan = { x: 0, y: 0 }, zoom = 1;
let dragging = null, dragOff = { x: 0, y: 0 };
let panning = false, panStart = { x: 0, y: 0 };
let editingId = null, debounceTimer = null, skipSync = false;
let cloudTimer = null;

const $ = id => document.getElementById(id);
const listbox = $("listbox"), world = $("world"), linesSvg = $("lines");
const canvas = $("canvas"), progfill = $("progfill"), counter = $("counter");
const panel = $("panel"), toggleBtn = $("toggleBtn");

// ── Parse & Layout ──
function parseList(text) {
  const lines = text.split("\n").filter(l => l.trim());
  const out = [], stack = [];
  lines.forEach(line => {
    const indent = (line.match(/^(\s*)/) || ["",""])[1].replace(/\t/g,"  ").length;
    const content = line.trim().replace(/^[-*•]\s*/, "");
    if (!content) return;
    const id = Math.random().toString(36).slice(2,9);
    while (stack.length && stack[stack.length-1].indent >= indent) stack.pop();
    const parent = stack.length ? stack[stack.length-1].id : null;
    out.push({ id, text: content, parent, done: false, x: 0, y: 0 });
    stack.push({ id, indent });
  });
  return out;
}

function layoutTree(flat) {
  if (!flat.length) return flat;
  const NW = 180, HG = 30, VG = 56;
  const byId = {}, childrenOf = {};
  flat.forEach(n => { byId[n.id] = n; });
  flat.forEach(n => { if (n.parent) { (childrenOf[n.parent] = childrenOf[n.parent] || []).push(n.id); }});
  const roots = flat.filter(n => !n.parent);
  const widths = {};
  function cw(id) {
    const kids = childrenOf[id] || [];
    if (!kids.length) { widths[id] = NW; return NW; }
    const t = kids.reduce((s,k) => s + cw(k), 0) + HG * (kids.length-1);
    widths[id] = Math.max(NW, t); return widths[id];
  }
  roots.forEach(r => cw(r.id));
  function pos(id, cx, cy) {
    byId[id].x = cx; byId[id].y = cy;
    const kids = childrenOf[id] || [];
    if (!kids.length) return;
    const tw = kids.reduce((s,k) => s + widths[k], 0) + HG * (kids.length-1);
    let sx = cx - tw/2;
    kids.forEach(k => { const kw = widths[k]; pos(k, sx+kw/2, cy+68+VG); sx += kw+HG; });
  }
  const trw = roots.reduce((s,r) => s + widths[r.id], 0) + HG * (roots.length-1);
  const cx = Math.max(trw / 2 + 40, window.innerWidth / 2);
  let sx = cx - trw/2;
  roots.forEach(r => { const rw = widths[r.id]; pos(r.id, sx+rw/2, 110); sx += rw+HG; });
  return flat;
}

function serializeNodes(ns) {
  const byId = {}, childrenOf = {};
  ns.forEach(n => { byId[n.id] = n; });
  ns.forEach(n => { if (n.parent) { (childrenOf[n.parent] = childrenOf[n.parent] || []).push(n.id); }});
  const roots = ns.filter(n => !n.parent);
  const lines = [];
  function walk(id, d) { const n = byId[id]; if (!n) return; lines.push("  ".repeat(d)+n.text); (childrenOf[id]||[]).forEach(c => walk(c,d+1)); }
  roots.forEach(r => walk(r.id, 0));
  return lines.join("\n");
}

function ancestorDone(nodeId) {
  const byId = {}; nodes.forEach(n => { byId[n.id] = n; });
  let cur = byId[nodeId];
  while (cur && cur.parent) { const p = byId[cur.parent]; if (p && p.done) return true; cur = p; }
  return false;
}

// ── Local Storage ──
function saveLocal() {
  try {
    const doneTexts = nodes.filter(n => n.done).map(n => n.text);
    localStorage.setItem("taskmap_data", JSON.stringify({ listText: listbox.value, doneTexts }));
  } catch(e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem("taskmap_data");
    if (raw) { const d = JSON.parse(raw); return { listText: d.listText || SAMPLE, doneSet: new Set(d.doneTexts || []) }; }
  } catch(e) {}
  return { listText: SAMPLE, doneSet: new Set() };
}

// ── JSONBin Cloud Sync ──
function getCloudConfig() {
  try {
    const raw = localStorage.getItem("taskmap_cloud");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { apiKey: "", binId: "" };
}

function saveCloudConfig(apiKey, binId) {
  localStorage.setItem("taskmap_cloud", JSON.stringify({ apiKey, binId }));
}

function setSyncStatus(msg, type) {
  const el = $("syncStatus");
  el.textContent = msg;
  el.className = type === "ok" ? "ok" : type === "err" ? "err" : "";
}

async function cloudPush() {
  const cfg = getCloudConfig();
  if (!cfg.apiKey) return;

  const doneTexts = nodes.filter(n => n.done).map(n => n.text);
  const payload = { listText: listbox.value, doneTexts, updated: Date.now() };

  try {
    if (cfg.binId) {
      // Update existing bin
      const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": cfg.apiKey },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("Push failed: " + res.status);
      setSyncStatus("Synced " + new Date().toLocaleTimeString(), "ok");
    } else {
      // Create new bin
      const res = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Master-Key": cfg.apiKey, "X-Bin-Name": "taskmap" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("Create failed: " + res.status);
      const data = await res.json();
      const newId = data.metadata.id;
      $("binIdInput").value = newId;
      saveCloudConfig(cfg.apiKey, newId);
      setSyncStatus("Created bin " + newId, "ok");
    }
  } catch(e) {
    setSyncStatus(e.message, "err");
  }
}

async function cloudPull() {
  const cfg = getCloudConfig();
  if (!cfg.apiKey || !cfg.binId) { setSyncStatus("Need API key + Bin ID to pull", "err"); return; }

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers: { "X-Master-Key": cfg.apiKey }
    });
    if (!res.ok) throw new Error("Pull failed: " + res.status);
    const data = await res.json();
    const rec = data.record;
    if (rec && rec.listText) {
      listbox.value = rec.listText;
      nodes = layoutTree(parseList(rec.listText));
      const ds = new Set(rec.doneTexts || []);
      nodes.forEach(n => { if (ds.has(n.text)) n.done = true; });
      saveLocal();
      render();
      setSyncStatus("Pulled " + new Date().toLocaleTimeString(), "ok");
    }
  } catch(e) {
    setSyncStatus(e.message, "err");
  }
}

function scheduleCloudPush() {
  const cfg = getCloudConfig();
  if (!cfg.apiKey) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(() => cloudPush(), 3000); // Push 3s after last change
}

// ── Render ──
function render() {
  world.querySelectorAll(".node").forEach(el => el.remove());

  const doneCount = nodes.filter(n => n.done).length;
  const total = nodes.length;
  const pct = total ? Math.round(doneCount/total*100) : 0;
  progfill.style.width = pct + "%";
  progfill.style.background = pct === 100 ? "#3dd68c" : "#5b5bd6";
  counter.textContent = doneCount + "/" + total;
  counter.style.color = pct === 100 ? "#3dd68c" : "#7a7a9a";

  const byId = {}; nodes.forEach(n => { byId[n.id] = n; });

  linesSvg.innerHTML = "";
  nodes.forEach(n => {
    if (!n.parent || !byId[n.parent]) return;
    const p = byId[n.parent];
    const d = n.done && p.done;
    const my = (p.y + n.y) / 2;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${p.x} ${p.y} C ${p.x} ${my}, ${n.x} ${my}, ${n.x} ${n.y}`);
    path.setAttribute("stroke", d ? "#1a1a2e" : "#2a2a3e");
    path.setAttribute("stroke-width", "1.5");
    path.setAttribute("fill", "none");
    if (d) path.setAttribute("stroke-dasharray", "4 4");
    linesSvg.appendChild(path);
  });

  nodes.forEach(n => {
    const isRoot = !n.parent;
    const isDone = n.done;
    const isAncDone = ancestorDone(n.id);
    const effectiveDone = isDone || isAncDone;

    const div = document.createElement("div");
    div.className = "node" + (isRoot ? " root" : " child") + (isDone ? " done-self" : "") + (isAncDone && !isDone ? " done-ancestor" : "");
    if (!isDone && !isAncDone) div.style.background = "#141420";
    div.style.left = n.x + "px";
    div.style.top = n.y + "px";
    div.dataset.id = n.id;

    const chk = document.createElement("button");
    chk.className = "chk" + (effectiveDone ? " checked" : "");
    if (effectiveDone) {
      chk.innerHTML = '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
    chk.addEventListener("click", e => { e.stopPropagation(); n.done = !n.done; saveLocal(); scheduleCloudPush(); render(); });
    div.appendChild(chk);

    if (editingId === n.id) {
      const inp = document.createElement("input");
      inp.className = "node-edit";
      inp.value = n.text;
      inp.addEventListener("blur", () => { n.text = inp.value || "Untitled"; editingId = null; skipSync = true; listbox.value = serializeNodes(nodes); saveLocal(); scheduleCloudPush(); render(); });
      inp.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === "Escape") inp.blur(); });
      div.appendChild(inp);
      setTimeout(() => inp.focus(), 0);
    } else {
      const span = document.createElement("span");
      span.className = "node-label";
      span.textContent = n.text;
      div.appendChild(span);
    }

    div.addEventListener("mousedown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON" || e.target.closest("button")) return;
      dragging = n.id;
      dragOff = { x: e.clientX / zoom - n.x - pan.x, y: e.clientY / zoom - n.y - pan.y };
      e.preventDefault();
    });
    div.addEventListener("touchstart", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON" || e.target.closest("button")) return;
      const t = e.touches[0];
      dragging = n.id;
      dragOff = { x: t.clientX / zoom - n.x - pan.x, y: t.clientY / zoom - n.y - pan.y };
    }, { passive: true });

    div.addEventListener("dblclick", e => {
      if (e.target.tagName === "BUTTON" || e.target.closest("button")) return;
      editingId = n.id; render();
    });

    world.appendChild(div);
  });

  applyTransform();
}

function applyTransform() {
  world.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  $("zoomLevel").textContent = Math.round(zoom * 100) + "%";
}

// ── List sync (debounced) ──
function syncListToMap() {
  if (skipSync) { skipSync = false; return; }
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const oldDone = {};
    nodes.forEach(n => { if (n.done) oldDone[n.text] = true; });
    nodes = layoutTree(parseList(listbox.value));
    nodes.forEach(n => { if (oldDone[n.text]) n.done = true; });
    saveLocal();
    scheduleCloudPush();
    render();
    fitToView();
  }, 500);
}

listbox.addEventListener("input", syncListToMap);

listbox.addEventListener("keydown", e => {
  if (e.key === "Tab") {
    e.preventDefault();
    const s = listbox.selectionStart, val = listbox.value;
    const ls = val.lastIndexOf("\n", s-1) + 1;
    if (e.shiftKey) {
      const sp = val.substring(ls).match(/^ {1,2}/);
      if (sp) {
        listbox.value = val.substring(0, ls) + val.substring(ls + sp[0].length);
        listbox.selectionStart = listbox.selectionEnd = s - sp[0].length;
        syncListToMap();
      }
    } else {
      listbox.value = val.substring(0, ls) + "  " + val.substring(ls);
      listbox.selectionStart = listbox.selectionEnd = s + 2;
      syncListToMap();
    }
  }
});

// ── Zoom ──
function setZoom(z) {
  zoom = Math.min(3, Math.max(0.25, z));
  applyTransform();
}

canvas.addEventListener("wheel", e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    setZoom(zoom + delta);
  }
}, { passive: false });

$("zoomIn").addEventListener("click", () => setZoom(zoom + 0.1));
$("zoomOut").addEventListener("click", () => setZoom(zoom - 0.1));

function fitToView() {
  if (!nodes.length) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x - 100);
    maxX = Math.max(maxX, n.x + 100);
    minY = Math.min(minY, n.y - 30);
    maxY = Math.max(maxY, n.y + 30);
  });
  const treeW = maxX - minX, treeH = maxY - minY;
  const vw = window.innerWidth, vh = window.innerHeight;
  const padding = 80;
  const scaleX = (vw - padding * 2) / treeW;
  const scaleY = (vh - padding * 2) / treeH;
  zoom = Math.min(scaleX, scaleY, 1.5);
  zoom = Math.max(0.25, Math.min(3, zoom));
  pan.x = (vw - treeW * zoom) / 2 - minX * zoom;
  pan.y = (vh - treeH * zoom) / 2 - minY * zoom + 20;
  applyTransform();
}

$("zoomFit").addEventListener("click", fitToView);

// ── Canvas pan ──
canvas.addEventListener("mousedown", e => {
  if (e.target.closest(".node") || e.target.closest("#panel") || e.target.closest("#topbar") || e.target.closest("#zoomBadge")) return;
  panning = true;
  panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
  canvas.style.cursor = "grabbing";
});
canvas.addEventListener("touchstart", e => {
  if (e.target.closest(".node") || e.target.closest("#panel") || e.target.closest("#topbar") || e.target.closest("#zoomBadge")) return;
  const t = e.touches[0];
  panning = true;
  panStart = { x: t.clientX - pan.x, y: t.clientY - pan.y };
}, { passive: true });

window.addEventListener("mousemove", e => {
  if (dragging) {
    const n = nodes.find(n => n.id === dragging);
    if (n) { n.x = e.clientX / zoom - dragOff.x - pan.x / zoom; n.y = e.clientY / zoom - dragOff.y - pan.y / zoom; render(); }
  } else if (panning) {
    pan = { x: e.clientX - panStart.x, y: e.clientY - panStart.y };
    applyTransform();
  }
});
window.addEventListener("touchmove", e => {
  const t = e.touches[0];
  if (dragging) {
    const n = nodes.find(n => n.id === dragging);
    if (n) { n.x = t.clientX / zoom - dragOff.x - pan.x / zoom; n.y = t.clientY / zoom - dragOff.y - pan.y / zoom; render(); }
  } else if (panning) {
    pan = { x: t.clientX - panStart.x, y: t.clientY - panStart.y };
    applyTransform();
  }
}, { passive: false });

window.addEventListener("mouseup", () => { dragging = null; panning = false; canvas.style.cursor = "default"; });
window.addEventListener("touchend", () => { dragging = null; panning = false; });

// ── Toggle panel ──
let showList = true;
toggleBtn.addEventListener("click", () => {
  showList = !showList;
  panel.classList.toggle("hidden", !showList);
  toggleBtn.textContent = showList ? "Hide List" : "Edit List";
  toggleBtn.classList.toggle("active", showList);
});

// ── Sync panel toggle ──
let syncOpen = false;
$("syncToggle").addEventListener("click", () => {
  syncOpen = !syncOpen;
  $("syncBody").classList.toggle("open", syncOpen);
  $("syncArrow").classList.toggle("open", syncOpen);
});

// Load cloud config into inputs
const cloudCfg = getCloudConfig();
$("apiKeyInput").value = cloudCfg.apiKey;
$("binIdInput").value = cloudCfg.binId;

$("syncSaveBtn").addEventListener("click", () => {
  const apiKey = $("apiKeyInput").value.trim();
  const binId = $("binIdInput").value.trim();
  saveCloudConfig(apiKey, binId);
  setSyncStatus("Config saved", "ok");
});

$("syncNowBtn").addEventListener("click", () => cloudPush());
$("syncPullBtn").addEventListener("click", () => cloudPull());

// ── Export / Import / Reset ──
$("exportBtn").addEventListener("click", () => {
  const doneTexts = nodes.filter(n => n.done).map(n => n.text);
  const blob = new Blob([JSON.stringify({ listText: listbox.value, doneTexts }, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "taskmap-backup.json"; a.click();
});

$("importBtn").addEventListener("click", () => {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.listText) {
          listbox.value = d.listText;
          nodes = layoutTree(parseList(d.listText));
          const ds = new Set(d.doneTexts || []);
          nodes.forEach(n => { if (ds.has(n.text)) n.done = true; });
          saveLocal(); scheduleCloudPush(); render();
        }
      } catch(err) { alert("Invalid file."); }
    };
    r.readAsText(file);
  };
  inp.click();
});

$("resetBtn").addEventListener("click", () => {
  if (confirm("Clear everything and start fresh?")) {
    listbox.value = SAMPLE;
    nodes = layoutTree(parseList(SAMPLE));
    localStorage.removeItem("taskmap_data");
    render();
  }
});

// ── Init ──
const saved = loadLocal();
listbox.value = saved.listText;
nodes = layoutTree(parseList(saved.listText));
nodes.forEach(n => { if (saved.doneSet.has(n.text)) n.done = true; });
render();
fitToView();
</script>
